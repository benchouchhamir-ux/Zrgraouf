<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Halliburton Blending Suite - Engineer Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --h-red: #cc0000;
            --h-dark: #0a0a0a;
            --h-card: #141414;
            --h-border: #252525;
            --text-main: #ffffff;
            --text-dim: #999;
        }

        body {
            margin: 0;
            font-family: 'Roboto', 'Segoe UI', sans-serif;
            background-color: var(--h-dark);
            color: var(--text-main);
            -webkit-user-select: none;
        }

        /* Engineering Header */
        header {
            background: #000;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid var(--h-red);
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }

        header h1 { margin: 0; font-size: 20px; letter-spacing: 6px; font-weight: 900; }
        header span { font-size: 10px; color: var(--h-red); letter-spacing: 2px; text-transform: uppercase; }

        .container { padding: 15px; padding-bottom: 110px; }

        /* Card System */
        .card {
            background: var(--h-card);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 15px;
            border: 1px solid var(--h-border);
        }

        .card-title {
            font-size: 14px;
            font-weight: bold;
            color: var(--h-red);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
        }

        /* Inputs */
        .input-row { margin-bottom: 12px; }
        label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
        input {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus { border-color: var(--h-red); outline: none; }

        /* Calculation Panel */
        .btn-calc {
            width: 100%;
            background: var(--h-red);
            color: #fff;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
            margin-top: 10px;
            cursor: pointer;
        }

        .results {
            margin-top: 15px;
            background: #000;
            border-radius: 8px;
            padding: 12px;
            display: none;
        }

        .res-line {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #1a1a1a;
            font-size: 14px;
        }
        .res-line:last-child { border: none; }
        .res-val { color: var(--h-red); font-weight: bold; }

        /* Floating Navigation */
        .nav-bar {
            position: fixed;
            bottom: 15px;
            left: 15px;
            right: 15px;
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(15px);
            display: flex;
            padding: 10px;
            border-radius: 15px;
            border: 1px solid #333;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.5);
        }

        .nav-item {
            flex: 1;
            text-align: center;
            color: #666;
            font-size: 10px;
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .nav-item i { font-size: 18px; }
        .nav-item.active { color: var(--h-red); }

        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.4s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <h1>HALLIBURTON</h1>
    <span>Engineering Field Suite</span>
</header>

<div class="container">
    <div id="v-frac" class="view active">
        <div class="card">
            <div class="card-title"><i class="fas fa-industry"></i> Frac Tank Inventory</div>
            <div class="input-row"><label>Capacity per Tank (Gal)</label><input type="number" id="fC" value="21000"></div>
            <div class="input-row"><label>Total Vertical Steps</label><input type="number" id="fS" value="11"></div>
            <div class="input-row"><label>Current Filled Steps</label><input type="number" id="fI" placeholder="0"></div>
            <button class="btn-calc" onclick="runFrac()">CALCULATE VOLUME</button>
            <div class="results" id="res-f">
                <div class="res-line"><span>Remaining Volume:</span><span class="res-val" id="out-f">0 Gal</span></div>
            </div>
        </div>
    </div>

    <div id="v-gel" class="view">
        <div class="card">
            <div class="card-title"><i class="fas fa-ruler-vertical"></i> Gel Pro Calibration</div>
            <div class="input-row"><label>Measured Dip (Inches)</label><input type="number" id="gI" placeholder="10 - 80"></div>
            <button class="btn-calc" onclick="runGel()">COMPUTE VOLUME</button>
            <div class="results" id="res-g">
                <div class="res-line"><span>Tank Level:</span><span class="res-val" id="out-g">0 Gal</span></div>
                <div class="res-line"><span>Status:</span><span id="stat-g" style="color:green; font-size:12px;">Operational</span></div>
            </div>
        </div>
    </div>

    <div id="v-chem" class="view">
        <div class="card">
            <div class="card-title"><i class="fas fa-microscope"></i> Chemical Requirements</div>
            <div class="input-row"><label>Base Fluid Volume (Gal)</label><input type="number" id="cW" value="15000"></div>
            <div class="input-row"><label>DCA (Gal/1000)</label><input type="number" id="cD" value="1.0" step="0.1"></div>
            <div class="input-row"><label>CLAWEB (Gal/1000)</label><input type="number" id="cCL" value="0.7" step="0.1"></div>
            <div class="input-row"><label>FE1A (Gal/1000)</label><input type="number" id="cFE" value="0.1" step="0.01"></div>
            <div class="input-row"><label>WG-11 (Lbs/1000)</label><input type="number" id="cWG" value="34" step="1"></div>
            <button class="btn-calc" onclick="runChem()">RUN CALCULATIONS</button>
            <div class="results" id="res-c">
                <div class="res-line"><span>DCA:</span><span class="res-val" id="o-d">0</span></div>
                <div class="res-line"><span>CLAWEB:</span><span class="res-val" id="o-cl">0</span></div>
                <div class="res-line"><span>FE1A:</span><span class="res-val" id="o-fe">0</span></div>
                <div class="res-line"><span>WG-11:</span><span class="res-val" id="o-wg">0</span></div>
            </div>
        </div>
    </div>
</div>

<nav class="nav-bar">
    <button class="nav-item active" onclick="nav('v-frac', this)"><i class="fas fa-database"></i>FRAC</button>
    <button class="nav-item" onclick="nav('v-gel', this)"><i class="fas fa-gauge"></i>GEL PRO</button>
    <button class="nav-item" onclick="nav('v-chem', this)"><i class="fas fa-flask-vial"></i>CHEM</button>
</nav>

<script>
    function nav(id, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function runFrac() {
        let c = parseFloat(document.getElementById('fC').value);
        let s = parseFloat(document.getElementById('fS').value);
        let i = parseFloat(document.getElementById('fI').value) || 0;
        let res = c - ((c/s) * i);
        document.getElementById('res-f').style.display = 'block';
        document.getElementById('out-f').innerText = Math.round(res).toLocaleString() + " Gal";
    }

    function runGel() {
        let dip = parseFloat(document.getElementById('gI').value);
        if(dip < 10 || dip > 80) { alert("ERROR: Input out of range (10-80)"); return; }
        const pts = [{x:10,y:2066},{x:11,y:2052},{x:15,y:1972},{x:16,y:1947},{x:60,y:587},{x:65,y:432},{x:80,y:0}];
        let vol = 0;
        for(let i=0; i<pts.length-1; i++){
            if(dip >= pts[i].x && dip <= pts[i+1].x){
                vol = pts[i].y + (dip-pts[i].x)*(pts[i+1].y-pts[i].y)/(pts[i+1].x-pts[i].x);
                break;
            }
        }
        document.getElementById('res-g').style.display = 'block';
        document.getElementById('out-g').innerText = vol.toFixed(1) + " Gal";
    }

    function runChem() {
        let w = parseFloat(document.getElementById('cW').value);
        let unit = w / 1000;
        document.getElementById('o-d').innerText = (unit * parseFloat(document.getElementById('cD').value)).toFixed(2) + " Gal";
        document.getElementById('o-cl').innerText = (unit * parseFloat(document.getElementById('cCL').value)).toFixed(2) + " Gal";
        document.getElementById('o-fe').innerText = (unit * parseFloat(document.getElementById('cFE').value)).toFixed(2) + " Gal";
        document.getElementById('o-wg').innerText = (unit * parseFloat(document.getElementById('cWG').value)).toFixed(1) + " Lbs";
        document.getElementById('res-c').style.display = 'block';
    }
</script>
</body>
</html>
